name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin ruff version to match .pre-commit-config.yaml (v0.15.0)
      - name: Install linters
        run: pip install "ruff==0.15.0"

      - name: Ruff check
        run: ruff check skills/ scripts/

      - name: Ruff format check
        run: ruff format --check skills/ scripts/

  test-skills:
    name: Test Skills
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill:
          - codebase-onboarding-generator
          - contract-reviewer
          - dual-axis-skill-reviewer
          - esg-reporter
          - financial-analyst
          - hearing-to-requirements-mapper
          - internal-audit-assistant
          - iso-implementation-guide
          - it-system-roi-analyzer
          - kpi-designer
          - meeting-asset-preparer
          - multi-file-log-correlator
          - production-schedule-optimizer
          - project-artifact-linker
          - project-completeness-scorer
          - qr-code-generator
          - shift-planner
          - skill-designer
          - skill-idea-miner
          - wbs-review-assistant
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Test ${{ matrix.skill }}
        run: >
          python -m pytest skills/${{ matrix.skill }}/scripts/tests/ -v
          --cov=skills/${{ matrix.skill }}/scripts
          --cov-report=term-missing

  test-repo-scripts:
    name: Test Repo Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Test repo-level scripts
        run: >
          python -m pytest scripts/tests/ -v
          --cov=scripts
          --cov-report=term-missing

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install security tools
        run: pip install "bandit[toml]>=1.9.0"

      - name: Bandit SAST scan
        run: bandit -r skills/ scripts/ --exclude "*/tests/*" -ll --skip B104,B310,B314,B608

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        working-directory: docs
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
